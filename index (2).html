  const { useState, useEffect, useRef } = React;

  // ===== AI MEMORY: build learner context sent with every message =====
  const buildLearnerProfile = (completedLessons, totalXP, streak, progress, selectedLevel) => {
    const lvlProg = Object.entries(progress).map(([k,v]) => k+': '+v+'%').join(', ');
    const lessons = completedLessons.join(', ') || 'aucune encore';
    return `
[PROFIL APPRENANT - Mémoire continue de Léo]
• XP total: ${totalXP} pts | Streak: ${streak} jours | Leçons complétées: ${lessons}
• Progression: ${lvlProg}
• Niveau actuel: ${selectedLevel || 'non sélectionné'}

Tu es Léo, assistant ASAPO. Tu te souviens de TOUT ce parcours. Adapte tes réponses à son niveau réel, référence ses leçons si pertinent, et motive-le vers la prochaine étape.`;
  };

  const getQuickActions = (completedLessons, totalXP) => {
    const actions = [];
    if (completedLessons.length === 0) {
      actions.push("Comment me présenter en lingala ?");
      actions.push("Quelles sont les premières phrases essentielles ?");
    } else {
      if (completedLessons.includes('salutations')) actions.push("Pratique les salutations avec moi !");
      if (completedLessons.includes('chiffres')) actions.push("Compte avec moi en lingala !");
      if (completedLessons.includes('famille')) actions.push("Parle de la famille en lingala");
      if (completedLessons.includes('marche')) actions.push("Simulons une scène au marché");
      if (completedLessons.includes('proverbes')) actions.push("Explique un proverbe congolais");
    }
    if (totalXP > 50) actions.push("Évalue mon niveau actuel");
    actions.push("Mot du jour en lingala 🌟");
    actions.push("Quelle est ma prochaine étape ?");
    return actions.slice(0, 5);
  };

const C = {
  gold: "#C9980A", dGold: "#A67C00", lGold: "#F0C842",
  dark: "#0D0D0D", d2: "#1A1A1A", d3: "#242424", d4: "#2E2E2E",
  cream: "#F7F3EA", text: "#1A1208", muted: "#7A6A4A",
  white: "#FFFFFF", red: "#B03A2E", green: "#1A5C35",
};

const css = `
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Raleway:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body,#root{font-family:'Raleway',sans-serif;background:#0D0D0D;color:#fff;min-height:100vh;}
.app{display:flex;flex-direction:column;min-height:100vh;}

.topbar{background:#0D0D0D;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:68px;position:sticky;top:0;z-index:200;border-bottom:1px solid rgba(201,152,10,0.25);}
.logo-wrap{display:flex;align-items:center;gap:.75rem;cursor:pointer;}
.logo-img{width:42px;height:42px;border-radius:50%;object-fit:cover;border:2px solid #C9980A;box-shadow:0 0 12px rgba(201,152,10,0.4);}
.logo-name{font-family:'Cinzel',serif;font-size:1.4rem;font-weight:900;color:#C9980A;letter-spacing:4px;}
.logo-tag{font-size:.56rem;color:rgba(201,152,10,0.55);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;}
.nav{display:flex;gap:.2rem;}
.nav-btn{background:transparent;border:none;color:rgba(255,255,255,0.5);padding:.45rem .9rem;border-radius:6px;cursor:pointer;font-family:'Raleway',sans-serif;font-size:.8rem;font-weight:600;transition:all .2s;display:flex;align-items:center;gap:.35rem;letter-spacing:.4px;}
.nav-btn:hover{color:#fff;background:rgba(201,152,10,0.1);}
.nav-btn.active{background:#C9980A;color:#0D0D0D;}

/* donate floating btn */
.donate-fab{position:fixed;bottom:2rem;right:2rem;z-index:300;background:linear-gradient(135deg,#C9980A,#F0C842);color:#0D0D0D;border:none;border-radius:30px;padding:.75rem 1.5rem;font-family:'Cinzel',serif;font-weight:700;font-size:.85rem;letter-spacing:1px;cursor:pointer;box-shadow:0 4px 20px rgba(201,152,10,0.5);transition:all .25s;display:flex;align-items:center;gap:.5rem;}
.donate-fab:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(201,152,10,0.65);}

.hero{background:#0D0D0D;padding:5rem 2rem 4rem;text-align:center;position:relative;overflow:hidden;border-bottom:1px solid rgba(201,152,10,0.12);}
.hero-glow{position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:500px;height:500px;background:radial-gradient(circle,rgba(201,152,10,0.1) 0%,transparent 70%);pointer-events:none;}
.hero-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;border:1px solid rgba(201,152,10,0.07);pointer-events:none;}
.hero-logo-big{width:130px;height:130px;border-radius:50%;object-fit:cover;border:3px solid #C9980A;box-shadow:0 0 40px rgba(201,152,10,0.5),0 0 80px rgba(201,152,10,0.18);margin:0 auto 1.75rem;display:block;position:relative;z-index:1;animation:pulseGlow 3s ease-in-out infinite;}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 40px rgba(201,152,10,0.5),0 0 80px rgba(201,152,10,0.18);}50%{box-shadow:0 0 60px rgba(201,152,10,0.7),0 0 110px rgba(201,152,10,0.3);}}
.hero-brand{font-family:'Cinzel',serif;font-size:3.8rem;font-weight:900;color:#C9980A;letter-spacing:12px;position:relative;z-index:1;}
.hero-sub{font-family:'Cinzel',serif;font-size:.72rem;color:rgba(201,152,10,0.5);letter-spacing:3px;text-transform:uppercase;margin:.5rem 0 1.5rem;position:relative;z-index:1;}
.devises{display:flex;justify-content:center;align-items:center;gap:.75rem;margin-bottom:2rem;position:relative;z-index:1;}
.devise{font-size:.78rem;color:rgba(255,255,255,0.65);letter-spacing:2px;text-transform:uppercase;font-weight:600;}
.dot{width:4px;height:4px;background:#C9980A;border-radius:50%;}
.hero-desc{color:rgba(255,255,255,0.5);font-size:.97rem;max-width:540px;margin:0 auto 2.5rem;line-height:1.8;position:relative;z-index:1;}

.main{flex:1;padding:2.5rem 2rem;max-width:1200px;margin:0 auto;width:100%;animation:pageIn .3s ease;}
@keyframes pageIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.stitle{font-family:'Cinzel',serif;font-size:1.55rem;font-weight:700;color:#fff;margin-bottom:.35rem;letter-spacing:.5px;}
.stitle .accent{color:#C9980A;}
.ssub{color:rgba(255,255,255,0.38);margin-bottom:1.75rem;font-size:.86rem;}
.divider{height:1px;background:rgba(201,152,10,0.1);margin:2.5rem 0;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

/* PROGRESS SYSTEM */
.prog-dashboard{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem;margin-bottom:2rem;}
.prog-card{background:#1A1A1A;border-radius:12px;padding:1.5rem;border:1px solid rgba(201,152,10,0.15);transition:all .2s;}
.prog-card:hover{border-color:#C9980A;}
.prog-level{font-family:'Cinzel',serif;font-size:1rem;font-weight:700;color:#C9980A;margin-bottom:.25rem;}
.prog-label{font-size:.72rem;color:rgba(255,255,255,0.4);letter-spacing:1px;text-transform:uppercase;margin-bottom:1rem;}
.prog-bar-bg{background:rgba(201,152,10,0.1);border-radius:2px;height:4px;margin:.6rem 0;}
.prog-bar-fill{height:4px;background:linear-gradient(90deg,#C9980A,#F0C842);border-radius:2px;transition:width .8s ease;}
.prog-pct{font-size:1.6rem;font-weight:700;font-family:'Cinzel',serif;color:#fff;}
.prog-badges{display:flex;gap:.5rem;margin-top:.75rem;flex-wrap:wrap;}
.badge{background:rgba(201,152,10,0.12);border:1px solid rgba(201,152,10,0.25);color:#C9980A;font-size:.68rem;font-weight:700;padding:.25rem .65rem;border-radius:20px;letter-spacing:.5px;}
.badge.earned{background:rgba(201,152,10,0.25);border-color:#C9980A;}

.streak-box{background:#1A1A1A;border-radius:12px;padding:1.25rem 1.5rem;border:1px solid rgba(201,152,10,0.2);display:flex;align-items:center;gap:1.5rem;margin-bottom:2rem;}
.streak-fire{font-size:2.5rem;}
.streak-num{font-family:'Cinzel',serif;font-size:2rem;font-weight:900;color:#C9980A;}
.streak-lbl{font-size:.75rem;color:rgba(255,255,255,0.4);letter-spacing:1px;text-transform:uppercase;}
.streak-days{display:flex;gap:.5rem;margin-left:auto;}
.streak-day{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;border:1px solid rgba(201,152,10,0.2);color:rgba(255,255,255,0.4);}
.streak-day.done{background:rgba(201,152,10,0.2);border-color:#C9980A;color:#C9980A;}
.streak-day.today{background:#C9980A;color:#0D0D0D;border-color:#C9980A;}

/* LEVELS */
.level-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-bottom:2.5rem;}
.level-card{background:#1A1A1A;border-radius:12px;padding:1.75rem 1.5rem;cursor:pointer;transition:all .3s;border:1px solid rgba(201,152,10,0.18);position:relative;overflow:hidden;}
.level-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#C9980A,transparent);}
.level-card:hover,.level-card.active{border-color:#C9980A;box-shadow:0 0 30px rgba(201,152,10,0.15);}
.lv-icon{font-size:2rem;margin-bottom:.9rem;}
.lv-tag{font-size:.65rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#C9980A;margin-bottom:.4rem;}
.lv-name{font-family:'Cinzel',serif;font-size:1.2rem;font-weight:700;color:#fff;margin-bottom:.65rem;}
.lv-desc{font-size:.82rem;color:rgba(255,255,255,0.45);line-height:1.65;margin-bottom:1.1rem;}
.lv-pill{display:inline-block;padding:.28rem .85rem;border-radius:4px;font-size:.72rem;font-weight:700;background:rgba(201,152,10,0.12);color:#C9980A;border:1px solid rgba(201,152,10,0.28);letter-spacing:.5px;}

/* LESSONS */
.lesson-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;margin-bottom:1.75rem;}
.lesson-item{background:#1A1A1A;border-radius:10px;padding:1.35rem;border:1px solid rgba(201,152,10,0.12);cursor:pointer;transition:all .2s;}
.lesson-item:hover,.lesson-item.active{border-color:#C9980A;}
.lesson-area{background:#1A1A1A;border-radius:12px;padding:2rem;border:1px solid rgba(201,152,10,0.15);animation:fadeUp .4s ease;margin-bottom:2rem;}
.lesson-hdr{display:flex;align-items:center;gap:1rem;padding-bottom:1rem;border-bottom:1px solid rgba(201,152,10,0.12);margin-bottom:1.5rem;}
.lesson-title{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:700;color:#fff;}
.tabs{display:flex;gap:.35rem;margin-bottom:1.75rem;background:#242424;padding:.4rem;border-radius:8px;width:fit-content;flex-wrap:wrap;}
.tab{padding:.5rem 1rem;border-radius:6px;cursor:pointer;font-weight:600;font-size:.8rem;border:none;background:transparent;color:rgba(255,255,255,0.4);transition:all .2s;font-family:'Raleway',sans-serif;}
.tab.active{background:#C9980A;color:#0D0D0D;}

.vocab-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.9rem;margin:1.25rem 0;}
.vocab-card{background:#242424;border-radius:10px;padding:1rem 1.2rem;border:1px solid rgba(201,152,10,0.1);cursor:pointer;transition:all .2s;}
.vocab-card:hover{border-color:#C9980A;background:rgba(201,152,10,0.05);}
.vl{font-family:'Cinzel',serif;font-size:1.05rem;font-weight:700;color:#C9980A;}
.vf{font-size:.83rem;color:rgba(255,255,255,0.6);margin-top:.25rem;}
.vp{font-size:.72rem;color:rgba(201,152,10,0.5);font-style:italic;margin-top:.12rem;}

.phrase-row{display:flex;align-items:flex-start;gap:.9rem;padding:.9rem 1rem;background:#242424;border-radius:10px;margin-bottom:.65rem;border:1px solid rgba(201,152,10,0.07);}
.pnum{width:26px;height:26px;background:#C9980A;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;color:#0D0D0D;flex-shrink:0;}
.pl{font-family:'Cinzel',serif;font-size:.95rem;font-weight:700;color:#C9980A;}
.pf{font-size:.79rem;color:rgba(255,255,255,0.5);margin-top:.2rem;}

.quiz-box{background:#242424;border-radius:12px;padding:2rem;border:1px solid rgba(201,152,10,0.18);margin:1.25rem 0;}
.quiz-q{font-family:'Cinzel',serif;font-size:1.15rem;font-weight:700;margin-bottom:1.5rem;color:#C9980A;}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;}
.quiz-opt{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:.85rem 1rem;cursor:pointer;transition:all .2s;font-family:'Raleway',sans-serif;font-size:.86rem;color:rgba(255,255,255,0.78);text-align:left;}
.quiz-opt:hover{border-color:#C9980A;background:rgba(201,152,10,0.08);}
.quiz-opt.correct{background:rgba(26,92,53,0.35);border-color:#2ECC71;color:#2ECC71;}
.quiz-opt.wrong{background:rgba(176,58,46,0.35);border-color:#E74C3C;color:#E74C3C;}

/* CHAT */
.ai-chat{background:#1A1A1A;border-radius:12px;border:1px solid rgba(201,152,10,0.2);overflow:hidden;height:540px;display:flex;flex-direction:column;}
.chat-hdr{background:#242424;padding:.9rem 1.5rem;display:flex;align-items:center;gap:.75rem;border-bottom:1px solid rgba(201,152,10,0.18);}
.chat-av{width:38px;height:38px;border-radius:50%;overflow:hidden;border:2px solid #C9980A;flex-shrink:0;}
.chat-av img{width:100%;height:100%;object-fit:cover;}
.chat-title{color:#fff;font-weight:700;font-size:.9rem;font-family:'Cinzel',serif;}
.chat-sub{color:rgba(255,255,255,0.38);font-size:.72rem;}
.chat-msgs{flex:1;overflow-y:auto;padding:1.25rem;display:flex;flex-direction:column;gap:.9rem;background:#141414;scroll-behavior:smooth;}
.chat-msgs::-webkit-scrollbar{width:4px;}
.chat-msgs::-webkit-scrollbar-track{background:transparent;}
.chat-msgs::-webkit-scrollbar-thumb{background:rgba(201,152,10,0.3);border-radius:2px;}
.msg{max-width:80%;animation:fadeUp .3s ease;}
.msg.user{align-self:flex-end;}.msg.assistant{align-self:flex-start;}
.msg-bub{padding:.75rem 1rem;border-radius:12px;font-size:.87rem;line-height:1.65;}
.msg.user .msg-bub{background:#C9980A;color:#0D0D0D;font-weight:600;border-bottom-right-radius:3px;}
.msg.assistant .msg-bub{background:#2A2A2A;color:rgba(255,255,255,0.82);border:1px solid rgba(201,152,10,0.14);border-bottom-left-radius:3px;}
.chat-inp-row{padding:.9rem;background:#1A1A1A;display:flex;gap:.7rem;border-top:1px solid rgba(201,152,10,0.1);}
.chat-inp{flex:1;border:1px solid rgba(201,152,10,0.22);border-radius:8px;padding:.65rem 1.1rem;font-family:'Raleway',sans-serif;font-size:.86rem;outline:none;background:#242424;color:#fff;transition:border .2s;}
.chat-inp:focus{border-color:#C9980A;}
.chat-inp::placeholder{color:rgba(255,255,255,0.28);}
.chat-send{background:#C9980A;border:none;border-radius:8px;padding:.65rem 1.4rem;cursor:pointer;font-family:'Raleway',sans-serif;font-weight:700;font-size:.83rem;color:#0D0D0D;transition:all .2s;}
.chat-send:hover{background:#F0C842;}
.chat-send:disabled{opacity:.4;cursor:not-allowed;}
.tdot{display:inline-block;width:7px;height:7px;background:#C9980A;border-radius:50%;animation:bounce 1.2s infinite;margin:0 2px;}
.tdot:nth-child(2){animation-delay:.2s;}.tdot:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.3;}40%{transform:translateY(-6px);opacity:1;}}

/* NEWS */
.news-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.2rem;margin-bottom:1.75rem;}
.news-card{background:#1A1A1A;border-radius:12px;padding:1.4rem;border:1px solid rgba(201,152,10,0.1);cursor:pointer;transition:all .2s;}
.news-card:hover{border-color:#C9980A;transform:translateY(-2px);}
.nc-cat{font-size:.67rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#C9980A;margin-bottom:.55rem;}
.nc-title{font-family:'Cinzel',serif;font-size:.93rem;font-weight:600;color:#fff;margin-bottom:.55rem;line-height:1.5;}
.nc-body{font-size:.8rem;color:rgba(255,255,255,0.42);line-height:1.6;margin-bottom:.65rem;}
.nc-meta{font-size:.7rem;color:rgba(201,152,10,0.48);}

/* INFO DRC */
.info-drc{background:#1A1A1A;border:1px solid rgba(201,152,10,0.18);border-radius:12px;padding:2.25rem;margin-bottom:2rem;position:relative;overflow:hidden;}
.info-drc::before{content:'🇨🇩';position:absolute;right:1.75rem;top:1.75rem;font-size:3.5rem;opacity:.08;}
.info-drc h2{font-family:'Cinzel',serif;font-size:1.5rem;color:#C9980A;margin-bottom:.9rem;letter-spacing:.5px;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-top:1.5rem;}
.stat-box{background:rgba(201,152,10,0.07);border-radius:8px;padding:.9rem;text-align:center;border:1px solid rgba(201,152,10,0.14);transition:all .2s;cursor:default;}
.stat-box:hover{background:rgba(201,152,10,0.12);border-color:rgba(201,152,10,0.3);}
.sv{font-family:'Cinzel',serif;font-size:1.35rem;font-weight:700;color:#C9980A;}
.sl{font-size:.7rem;color:rgba(255,255,255,0.42);margin-top:.2rem;letter-spacing:.5px;}

/* PRESTATAIRES */
.presta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem;}
.presta-card{background:#1A1A1A;border-radius:12px;padding:1.4rem;border:1px solid rgba(201,152,10,0.1);transition:all .2s;cursor:pointer;}
.presta-card:hover{transform:translateY(-3px);border-color:#C9980A;}
.pa{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin-bottom:.9rem;border:2px solid rgba(201,152,10,0.35);background:#2A2A2A;}
.pname{font-family:'Cinzel',serif;font-size:.9rem;font-weight:700;color:#fff;margin-bottom:.22rem;}
.pservice{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#C9980A;margin-bottom:.45rem;}
.pdesc{font-size:.79rem;color:rgba(255,255,255,0.42);line-height:1.55;margin-bottom:.7rem;}
.pmeta{display:flex;align-items:center;justify-content:space-between;font-size:.73rem;}
.ploc{color:rgba(255,255,255,0.38);}
.prating{color:#C9980A;font-weight:700;}

/* BUTTONS */
.btn{background:#C9980A;color:#0D0D0D;border:none;padding:.7rem 1.6rem;border-radius:6px;font-family:'Raleway',sans-serif;font-weight:700;font-size:.86rem;cursor:pointer;transition:all .2s;letter-spacing:.4px;}
.btn:hover{background:#F0C842;transform:translateY(-1px);}
.btn:active{transform:translateY(0) scale(.98);}
.btn-o:active{transform:translateY(0) scale(.98);}
.btn-o{background:transparent;color:#C9980A;border:1px solid rgba(201,152,10,0.45);padding:.7rem 1.6rem;border-radius:6px;font-family:'Raleway',sans-serif;font-weight:700;font-size:.86rem;cursor:pointer;transition:all .2s;letter-spacing:.4px;}
.btn-o:hover{background:rgba(201,152,10,0.1);border-color:#C9980A;}
.btn-sm{padding:.45rem 1rem;font-size:.78rem;border-radius:5px;}

/* FILTERS */
.filter-row{display:flex;gap:.55rem;margin-bottom:1.4rem;flex-wrap:wrap;}
.chip{padding:.38rem .9rem;border-radius:4px;font-size:.76rem;font-weight:700;cursor:pointer;border:1px solid rgba(201,152,10,0.18);background:transparent;color:rgba(255,255,255,0.42);transition:all .2s;font-family:'Raleway',sans-serif;letter-spacing:.4px;}
.chip:hover,.chip.active{background:#C9980A;border-color:#C9980A;color:#0D0D0D;}

/* FORMS */
.form-section{background:#1A1A1A;border-radius:12px;padding:2rem;border:1px solid rgba(201,152,10,0.15);margin-bottom:2rem;animation:fadeUp .4s ease;}
.form-title{font-family:'Cinzel',serif;font-size:1.1rem;color:#C9980A;margin-bottom:1.5rem;letter-spacing:.5px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.form-group{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.9rem;}
.form-group.full{grid-column:1/-1;}
label{font-size:.78rem;font-weight:700;color:rgba(255,255,255,0.55);letter-spacing:.5px;text-transform:uppercase;}
input,select,textarea{background:#242424;border:1px solid rgba(201,152,10,0.2);border-radius:7px;padding:.65rem 1rem;font-family:'Raleway',sans-serif;font-size:.87rem;color:#fff;outline:none;transition:border .2s;width:100%;}
input:focus,select:focus,textarea:focus{border-color:#C9980A;}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.25);}
select option{background:#1A1A1A;color:#fff;}
textarea{resize:vertical;min-height:90px;}

/* PRO LISTING CARD */
.pro-pub-card{background:#1A1A1A;border-radius:12px;padding:1.35rem;border:1px solid rgba(201,152,10,0.12);margin-bottom:1rem;animation:fadeUp .3s ease;}
.pro-pub-hdr{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem;}
.pro-pub-av{width:44px;height:44px;border-radius:50%;background:#2A2A2A;border:2px solid rgba(201,152,10,0.3);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.pro-pub-name{font-family:'Cinzel',serif;font-size:.95rem;font-weight:700;color:#fff;}
.pro-pub-svc{font-size:.7rem;color:#C9980A;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.pro-pub-body{font-size:.82rem;color:rgba(255,255,255,0.5);line-height:1.6;margin-bottom:.75rem;}
.pro-pub-tag{display:inline-block;background:rgba(201,152,10,0.1);border:1px solid rgba(201,152,10,0.22);color:#C9980A;font-size:.68rem;font-weight:700;padding:.2rem .6rem;border-radius:4px;margin-right:.4rem;letter-spacing:.4px;}

/* DONATION MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:400;display:flex;align-items:center;justify-content:center;padding:1rem;}
.modal{background:#1A1A1A;border-radius:16px;border:1px solid rgba(201,152,10,0.3);padding:2.5rem;max-width:540px;width:100%;position:relative;animation:fadeUp .3s ease;max-height:90vh;overflow-y:auto;}
.modal-close{position:absolute;top:1rem;right:1rem;background:transparent;border:none;color:rgba(255,255,255,0.4);font-size:1.4rem;cursor:pointer;padding:.25rem .5rem;transition:color .2s;}
.modal-close:hover{color:#fff;}
.modal-title{font-family:'Cinzel',serif;font-size:1.4rem;font-weight:700;color:#C9980A;margin-bottom:.5rem;letter-spacing:.5px;}
.modal-sub{color:rgba(255,255,255,0.45);font-size:.87rem;margin-bottom:1.75rem;line-height:1.6;}
.donation-amounts{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1.25rem;}
.da-btn{background:#242424;border:1px solid rgba(201,152,10,0.22);border-radius:8px;padding:.9rem;cursor:pointer;text-align:center;transition:all .2s;font-family:'Raleway',sans-serif;}
.da-btn:hover,.da-btn.active{background:rgba(201,152,10,0.15);border-color:#C9980A;}
.da-amount{font-family:'Cinzel',serif;font-size:1.2rem;font-weight:700;color:#C9980A;}
.da-label{font-size:.72rem;color:rgba(255,255,255,0.45);margin-top:.2rem;}
.success-box{background:rgba(26,92,53,0.2);border:1px solid rgba(46,204,113,0.3);border-radius:10px;padding:1.5rem;text-align:center;margin-top:1rem;}

/* TOAST */
/* === AI MEMORY SYSTEM === */
.ai-memory-panel{background:linear-gradient(135deg,rgba(201,152,10,0.07),rgba(201,152,10,0.03));border:1px solid rgba(201,152,10,0.25);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1.75rem;animation:fadeUp .4s ease;}
.ai-memory-hdr{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem;}
.ai-memory-dot{width:10px;height:10px;background:#C9980A;border-radius:50%;animation:aiPulse 2s ease infinite;flex-shrink:0;}
@keyframes aiPulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(.8);}}
.ai-memory-title{font-family:'Cinzel',serif;font-size:.9rem;font-weight:700;color:#C9980A;}
.ai-memory-chips{display:flex;gap:.5rem;flex-wrap:wrap;}
.ai-mem-chip{background:rgba(201,152,10,0.1);border:1px solid rgba(201,152,10,0.2);color:rgba(255,255,255,0.65);font-size:.72rem;padding:.25rem .75rem;border-radius:20px;font-weight:600;}
.ai-mem-chip.highlight{background:rgba(201,152,10,0.22);border-color:#C9980A;color:#C9980A;}
.ai-suggestion{background:#1A1A1A;border:1px solid rgba(201,152,10,0.28);border-radius:12px;padding:1.25rem;margin-bottom:1.5rem;display:flex;gap:1rem;align-items:flex-start;animation:fadeUp .4s ease;cursor:pointer;transition:all .2s;}
.ai-suggestion:hover{border-color:#C9980A;transform:translateY(-1px);}
.ai-sug-icon{font-size:1.75rem;flex-shrink:0;}
.ai-sug-title{font-family:'Cinzel',serif;font-size:.93rem;font-weight:700;color:#C9980A;margin-bottom:.3rem;}
.ai-sug-body{font-size:.82rem;color:rgba(255,255,255,0.5);line-height:1.6;}
.ai-sug-badge{display:inline-block;background:rgba(201,152,10,0.12);border:1px solid rgba(201,152,10,0.25);color:#C9980A;font-size:.68rem;font-weight:700;padding:.2rem .65rem;border-radius:4px;margin-top:.5rem;letter-spacing:.4px;}
.ai-lesson-box{background:#242424;border-radius:12px;padding:1.5rem;border:1px solid rgba(201,152,10,0.15);margin-top:1rem;animation:fadeUp .4s ease;}
.ai-lesson-hdr{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid rgba(201,152,10,0.1);}
.ai-lesson-title{font-family:'Cinzel',serif;font-size:.95rem;font-weight:700;color:#C9980A;}
.ai-lesson-content{font-size:.87rem;color:rgba(255,255,255,0.75);line-height:1.8;white-space:pre-wrap;}
.ai-loading{display:flex;align-items:center;gap:.75rem;padding:1rem;color:rgba(255,255,255,0.4);font-size:.86rem;}
.chat-memory-badge{background:rgba(46,204,113,0.1);border:1px solid rgba(46,204,113,0.25);color:#2ECC71;font-size:.68rem;font-weight:700;padding:.22rem .65rem;border-radius:20px;display:flex;align-items:center;gap:.35rem;letter-spacing:.3px;margin-left:auto;}
.chat-quick-actions{padding:.65rem 1rem;background:#1E1E1E;display:flex;gap:.45rem;flex-wrap:wrap;border-top:1px solid rgba(201,152,10,0.07);}
.quick-action-btn{background:rgba(201,152,10,0.07);border:1px solid rgba(201,152,10,0.15);color:rgba(255,255,255,0.6);font-size:.72rem;font-weight:600;padding:.28rem .7rem;border-radius:20px;cursor:pointer;transition:all .2s;font-family:'Raleway',sans-serif;white-space:nowrap;}
.quick-action-btn:hover{background:rgba(201,152,10,0.18);border-color:#C9980A;color:#fff;}

.toast{position:fixed;bottom:6rem;right:2rem;background:#242424;color:#fff;padding:.9rem 1.4rem;border-radius:8px;font-weight:600;font-size:.86rem;z-index:500;animation:fadeUp .3s ease;border-left:3px solid #C9980A;max-width:320px;}

/* AUTH SCREEN */
.auth-screen{min-height:100vh;background:#0D0D0D;display:flex;align-items:center;justify-content:center;padding:1.5rem;position:relative;overflow:hidden;}
.auth-bg-glow{position:absolute;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:800px;background:radial-gradient(circle,rgba(201,152,10,0.08) 0%,transparent 65%);pointer-events:none;}
.auth-bg-ring{position:absolute;border-radius:50%;border:1px solid rgba(201,152,10,0.05);pointer-events:none;top:50%;left:50%;transform:translate(-50%,-50%);}
.auth-panel{background:#141414;border:1px solid rgba(201,152,10,0.2);border-radius:20px;padding:2.75rem 2.5rem;width:100%;max-width:420px;position:relative;z-index:1;animation:fadeUp .5s ease;}
.auth-logo-wrap{text-align:center;margin-bottom:2rem;}
.auth-logo{width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid #C9980A;box-shadow:0 0 30px rgba(201,152,10,0.4),0 0 60px rgba(201,152,10,0.15);margin:0 auto .75rem;display:block;}
.auth-brand{font-family:'Cinzel',serif;font-size:1.8rem;font-weight:900;color:#C9980A;letter-spacing:6px;}
.auth-tagline{font-size:.68rem;color:rgba(201,152,10,0.45);letter-spacing:2px;text-transform:uppercase;margin-top:.3rem;}
.auth-title{font-family:'Cinzel',serif;font-size:1.25rem;font-weight:700;color:#fff;text-align:center;margin-bottom:.4rem;}
.auth-sub{font-size:.82rem;color:rgba(255,255,255,0.38);text-align:center;margin-bottom:1.75rem;}
.auth-divider{display:flex;align-items:center;gap:.75rem;margin:1.5rem 0;}
.auth-divider-line{flex:1;height:1px;background:rgba(255,255,255,0.08);}
.auth-divider-text{font-size:.72rem;color:rgba(255,255,255,0.28);letter-spacing:1px;text-transform:uppercase;white-space:nowrap;}
.social-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:.75rem;padding:.85rem 1.25rem;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);cursor:pointer;font-family:'Raleway',sans-serif;font-size:.88rem;font-weight:600;color:rgba(255,255,255,0.82);transition:all .2s;margin-bottom:.65rem;letter-spacing:.2px;}
.social-btn:hover{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.2);transform:translateY(-1px);}
.social-btn.facebook{border-color:rgba(24,119,242,0.35);color:#4A90E2;}
.social-btn.facebook:hover{background:rgba(24,119,242,0.08);border-color:rgba(24,119,242,0.55);}

.auth-input::placeholder{color:rgba(255,255,255,0.2);}
.auth-submit{width:100%;background:linear-gradient(135deg,#C9980A,#E5B020);color:#0D0D0D;border:none;border-radius:10px;padding:.9rem;font-family:'Cinzel',serif;font-weight:700;font-size:.92rem;cursor:pointer;transition:all .25s;letter-spacing:.5px;margin-top:.5rem;}
.auth-submit:hover{background:linear-gradient(135deg,#E5B020,#F0C842);transform:translateY(-1px);box-shadow:0 6px 24px rgba(201,152,10,0.35);}
.auth-switch{text-align:center;margin-top:1.25rem;font-size:.82rem;color:rgba(255,255,255,0.35);}
.auth-switch-btn{background:none;border:none;color:#C9980A;font-family:'Raleway',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;padding:0;transition:color .2s;}
.auth-switch-btn:hover{color:#F0C842;}
.auth-footer{text-align:center;margin-top:2rem;font-size:.7rem;color:rgba(255,255,255,0.18);line-height:1.6;}
.auth-avatar-row{display:flex;gap:.5rem;justify-content:center;margin-bottom:1.5rem;flex-wrap:wrap;}
.auth-avatar-opt{width:40px;height:40px;border-radius:50%;background:#2A2A2A;border:2px solid transparent;display:flex;align-items:center;justify-content:center;font-size:1.2rem;cursor:pointer;transition:all .2s;}
.auth-avatar-opt.selected{border-color:#C9980A;background:rgba(201,152,10,0.1);}
.user-badge{display:flex;align-items:center;gap:.5rem;background:rgba(201,152,10,0.08);border:1px solid rgba(201,152,10,0.2);border-radius:8px;padding:.35rem .75rem;cursor:pointer;transition:all .2s;}
.user-badge:hover{background:rgba(201,152,10,0.15);}

.user-menu-item{width:100%;display:flex;align-items:center;gap:.6rem;padding:.6rem .85rem;border-radius:7px;background:transparent;border:none;color:rgba(255,255,255,0.65);font-family:'Raleway',sans-serif;font-size:.83rem;cursor:pointer;transition:all .2s;text-align:left;}

.pwd-toggle-btn{position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,0.3);cursor:pointer;font-size:.85rem;padding:0;}
.field-error{font-size:.72rem;color:#E74C3C;margin-top:.3rem;}
.auth-progress-bar{height:3px;background:rgba(201,152,10,0.15);border-radius:2px;margin-bottom:1.75rem;overflow:hidden;}
.auth-progress-fill{height:100%;background:linear-gradient(90deg,#C9980A,#F0C842);transition:width .4s ease;}
@keyframes authIn{from{opacity:0;transform:translateY(20px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}

.spinner{width:18px;height:18px;border:2px solid rgba(201,152,10,0.3);border-top-color:#C9980A;border-radius:50%;animation:spin .8s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}

          <img src={ASAPO_LOGO} alt="ASAPO" className="auth-logo"/>
          <div className="auth-brand">ASAPO</div>
          <div className="auth-tagline">Determination · Perseverance · Prosperite</div>
        </div>

        <div className="auth-title">
          {authMode==="login"?"Connexion":authMode==="register"?"Creer un compte":"Mot de passe oublie"}
        </div>
        <div className="auth-sub">
          {authMode==="login"?"Bon retour parmi nous !":authMode==="register"?"Rejoignez la communaute ASAPO":"Entrez votre email pour reinitialiser"}
        </div>

        {authMode !== "forgot" && (
          <>
            <button className="social-btn facebook" onClick={()=>handleSocialAuth("facebook")} disabled={authLoading}>
              <svg className="social-icon" viewBox="0 0 24 24" fill="#1877F2">
                <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
              </svg>
              {authLoading?"Connexion...":"Continuer avec Facebook"}
            </button>
            <button className="social-btn google" onClick={()=>handleSocialAuth("google")} disabled={authLoading}>
              <svg className="social-icon" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
              </svg>
              {authLoading?"Connexion...":"Continuer avec Google"}
            </button>
            <div className="auth-divider">
              <div className="auth-divider-line"/>
              <span className="auth-divider-text">ou par email</span>
              <div className="auth-divider-line"/>
            </div>
          </>
        )}

        {authMode==="register" && (
          <>
            <div className="auth-input-group">
              <label className="auth-label">Prenom *</label>
              <input className="auth-input" placeholder="Votre prenom" value={authForm.name} onChange={e=>setAuthForm({...authForm,name:e.target.value})}/>
              {authErrors.name && <div className="field-error">{authErrors.name}</div>}
            </div>
            <div style={{marginBottom:"1rem"}}>
              <label className="auth-label" style={{fontSize:".73rem",fontWeight:700,color:"rgba(255,255,255,0.42)",letterSpacing:".8px",textTransform:"uppercase",marginBottom:".5rem",display:"block"}}>Choisissez votre avatar</label>
              <div className="auth-avatar-row">
                {AVATARS.map((av,i)=>(
                  <div key={i} className={`auth-avatar-opt ${authForm.avatar===av?"selected":""}`} onClick={()=>setAuthForm({...authForm,avatar:av})}>{av}</div>
                ))}
              </div>
            </div>
          </>
        )}

        <div className="auth-input-group">
          <label className="auth-label">Adresse email *</label>
          <input className="auth-input" type="email" placeholder="votre@email.com" value={authForm.email} onChange={e=>setAuthForm({...authForm,email:e.target.value})}/>
          {authErrors.email && <div className="field-error">{authErrors.email}</div>}
        </div>

        {authMode !== "forgot" && (
          <div className="auth-input-group">
            <label className="auth-label">Mot de passe *</label>
            <div className="pwd-toggle">
              <input className="auth-input" type={showPassword?"text":"password"} placeholder={authMode==="register"?"8 caracteres minimum":"Votre mot de passe"} value={authForm.password} onChange={e=>setAuthForm({...authForm,password:e.target.value})} style={{paddingRight:"2.75rem"}}/>
              <button className="pwd-toggle-btn" onClick={()=>setShowPassword(!showPassword)}>{showPassword?"🙈":"👁"}</button>
            </div>
            {authErrors.password && <div className="field-error">{authErrors.password}</div>}
          </div>
        )}

        {authMode==="register" && (
          <div className="auth-input-group">
            <label className="auth-label">Confirmer le mot de passe *</label>
            <input className="auth-input" type={showPassword?"text":"password"} placeholder="Repetez le mot de passe" value={authForm.confirmPassword} onChange={e=>setAuthForm({...authForm,confirmPassword:e.target.value})}/>
            {authErrors.confirmPassword && <div className="field-error">{authErrors.confirmPassword}</div>}
          </div>
        )}

        {authMode==="login" && (
          <div style={{textAlign:"right",marginBottom:".75rem",marginTop:"-.5rem"}}>
            <button className="auth-switch-btn" style={{fontSize:".78rem"}} onClick={()=>{setAuthMode("forgot");setAuthErrors({});}}>Mot de passe oublie ?</button>
          </div>
        )}

        <button className="auth-submit" onClick={handleEmailAuth} disabled={authLoading}>
          {authLoading ? (
            <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:".5rem"}}>
              <span className="spinner" style={{width:16,height:16}}/> Chargement...
            </span>
          ) : authMode==="login" ? "Se connecter" : authMode==="register" ? "Creer mon compte" : "Envoyer le lien"}
        </button>

        <div className="auth-switch">
          {authMode==="login" ? (
            <>Pas encore de compte ? <button className="auth-switch-btn" onClick={()=>{setAuthMode("register");setAuthErrors({});}}>S'inscrire</button></>
          ) : authMode==="register" ? (
            <>Deja un compte ? <button className="auth-switch-btn" onClick={()=>{setAuthMode("login");setAuthErrors({});}}>Se connecter</button></>
          ) : (
            <button className="auth-switch-btn" onClick={()=>{setAuthMode("login");setAuthErrors({});}}>Retour a la connexion</button>
          )}
        </div>

        <div className="auth-footer">
          En vous connectant, vous acceptez nos conditions d'utilisation<br/>et notre politique de confidentialite.
        </div>
      </div>
    </div>
  );

  const renderDonateModal = () => (
    <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget){setShowDonate(false);setDonationDone(false);}}}>
      <div className="modal">
        <button className="modal-close" onClick={()=>{setShowDonate(false);setDonationDone(false);}}>✕</button>
        <img src={ASAPO_LOGO} alt="ASAPO" style={{width:64,height:64,borderRadius:"50%",border:"2px solid #C9980A",display:"block",margin:"0 auto 1.25rem"}}/>
        <div className="modal-title" style={{textAlign:"center"}}>Soutenir ASAPO 💛</div>
        <div className="modal-sub" style={{textAlign:"center"}}>Votre don permet de maintenir et développer cette plateforme gratuite au service de la communauté congolaise dans le monde entier.</div>

        {!donationDone ? (<>
          <div className="form-group"><label>Votre prénom (optionnel)</label><input placeholder="Prénom" value={donorName} onChange={e=>setDonorName(e.target.value)}/></div>
          <label style={{display:"block",marginBottom:".75rem",fontSize:".78rem",fontWeight:700,color:"rgba(255,255,255,0.55)",letterSpacing:".5px",textTransform:"uppercase"}}>Choisissez un montant</label>
          <div className="donation-amounts">
            {DONATION_AMOUNTS.map((d,i)=>(
              <div key={i} className={`da-btn ${donationAmount===d.amount?"active":""}`} onClick={()=>setDonationAmount(d.amount)}>
                {d.amount==="custom"?<div className="da-amount">Libre</div>:<div className="da-amount">{d.amount}€</div>}
                <div className="da-label">{d.label}</div>
              </div>
            ))}
          </div>
          {donationAmount==="custom"&&(
            <div className="form-group"><label>Montant personnalisé (€)</label><input type="number" min="1" placeholder="Ex: 30" value={customAmount} onChange={e=>setCustomAmount(e.target.value)}/></div>
          )}
          <div style={{background:"#242424",borderRadius:8,padding:"1rem",marginBottom:"1.25rem",fontSize:".8rem",color:"rgba(255,255,255,0.45)",lineHeight:1.6}}>
            🔒 Paiement sécurisé · Votre don aide à financer le développement de l'application, l'hébergement et les ressources pédagogiques gratuites.
          </div>
          <button className="btn" style={{width:"100%",padding:"1rem",fontSize:".95rem"}} onClick={handleDonate}>
            Faire un don de {donationAmount==="custom"?(customAmount||"..")+"€":donationAmount+"€"} sur HelloAsso 💛
          </button>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:".5rem",marginTop:".75rem"}}>
            <img src="https://www.helloasso.com/favicon.ico" style={{width:16,height:16,borderRadius:2}} alt="HelloAsso" onError={e=>e.target.style.display="none"}/>
            <span style={{fontSize:".72rem",color:"rgba(255,255,255,0.3)"}}>Paiement sécurisé via <strong style={{color:"rgba(255,255,255,0.5)"}}>HelloAsso</strong> · Reçu fiscal disponible</span>
          </div>
          <a href="https://www.helloasso.com/associations/asapo" target="_blank" rel="noopener noreferrer"
             style={{display:"block",textAlign:"center",marginTop:".5rem",fontSize:".72rem",color:"rgba(201,152,10,0.6)",textDecoration:"underline"}}>
            Voir la page HelloAsso ASAPO →
          </a>
        </>) : (
          <div className="success-box">
            <div style={{fontSize:"3rem",marginBottom:".75rem"}}>🎉</div>
            <div style={{fontFamily:"'Cinzel',serif",color:"#2ECC71",fontSize:"1.15rem",fontWeight:700,marginBottom:".5rem"}}>Merci {donorName||""} !</div>
            <div style={{color:"rgba(255,255,255,0.55)",fontSize:".85rem",lineHeight:1.6,marginBottom:"1rem"}}>Vous allez être redirigé(e) vers HelloAsso pour finaliser votre don en toute sécurité. Votre soutien est précieux pour toute la communauté ASAPO. 🇨🇩</div>
            <a href="https://www.helloasso.com/associations/asapo" target="_blank" rel="noopener noreferrer"
               style={{display:"inline-block",background:"#2ECC71",color:"#0D0D0D",padding:".65rem 1.5rem",borderRadius:6,fontWeight:700,fontSize:".85rem",textDecoration:"none",fontFamily:"'Cinzel',serif"}}>
              Finaliser sur HelloAsso →
            </a>
          </div>
        )}
      </div>
    </div>
  );

  return (
    <>
      <style>{css}</style>
      <div className="app">
        <div className="topbar">
          <div className="logo-wrap" onClick={()=>setPage("home")}>
            <img src={ASAPO_LOGO} alt="ASAPO" className="logo-img"/>
            <div><div className="logo-name">ASAPO</div><div className="logo-tag">Détermination · Persévérance · Prospérité</div></div>
          </div>
          <nav className="nav">
            {NAV.map(n=><button key={n.id} className={`nav-btn ${page===n.id?"active":""}`} onClick={()=>setPage(n.id)} aria-label={n.label} aria-current={page===n.id?"page":undefined}>{n.icon} {n.label}</button>)}
          </nav>
          <div style={{position:"relative",marginLeft:"1rem",flexShrink:0}}>
            {authUser ? (
              <>
                <div className="user-badge" onClick={()=>setShowUserMenu(!showUserMenu)}>
                  <div className="user-badge-av">{authUser.avatar}</div>
                  <span className="user-badge-name">{authUser.name.split(" ")[0]}</span>
                  <span style={{fontSize:".65rem",color:"rgba(201,152,10,0.5)",marginLeft:".15rem"}}>▾</span>
                </div>
                {showUserMenu && (
                  <div className="user-menu">
                    <div style={{padding:".5rem .85rem .75rem",borderBottom:"1px solid rgba(255,255,255,0.07)",marginBottom:".35rem"}}>
                      <div style={{fontSize:".82rem",fontWeight:700,color:"#fff",fontFamily:"'Cinzel',serif"}}>{authUser.name}</div>
                      <div style={{fontSize:".7rem",color:"rgba(255,255,255,0.3)",marginTop:".15rem"}}>{authUser.email}</div>
                    </div>
                    <button className="user-menu-item" onClick={()=>{setPage("progress");setShowUserMenu(false);}}>📊 Ma progression</button>
                    <button className="user-menu-item" onClick={()=>{setPage("learn");setShowUserMenu(false);}}>📚 Apprendre</button>
                    <button className="user-menu-item" onClick={()=>{setShowDonate(true);setShowUserMenu(false);}}>💛 Faire un don</button>
                    <div style={{height:1,background:"rgba(255,255,255,0.07)",margin:".35rem 0"}}/>
                    <button className="user-menu-item danger" onClick={handleLogout}>↩ Se deconnecter</button>
                  </div>
                )}
              </>
            ) : (
              <button className="btn btn-sm" style={{background:"transparent",border:"1px solid rgba(201,152,10,0.45)",color:"#C9980A"}} onClick={()=>{setShowAuthModal(true);setAuthMode("login");}}>
                Se connecter
              </button>
            )}
          </div>
        </div>

        {page==="home"&&renderHome()}
        {page==="learn"&&renderLearn()}
        {page==="progress"&&renderProgress()}
        {page==="chat"&&renderChat()}
        {page==="rdcinfo"&&renderRDC()}
        {page==="prestataires"&&renderPrestataires()}

        {/* Mobile bottom navigation */}
        <div className="mobile-nav">
          {NAV.map(n=>(
            <button key={n.id} className={`mob-btn ${page===n.id?"active":""}`} onClick={()=>setPage(n.id)}>
              <span className="mob-btn-icon">{n.icon}</span>
              <span>{n.label.length > 7 ? n.label.slice(0,7)+'…' : n.label}</span>
            </button>
          ))}
        </div>

        <div style={{background:"#0D0D0D",borderTop:"1px solid rgba(201,152,10,0.08)",color:"rgba(255,255,255,0.2)",textAlign:"center",padding:"1.25rem",fontSize:".75rem",letterSpacing:".4px",marginTop:"auto"}}>
          <span style={{color:"#C9980A",fontWeight:700,fontFamily:"'Cinzel',serif",letterSpacing:"2px"}}>ASAPO</span>
          {" · Détermination · Persévérance · Prospérité · 🇨🇩"}
          <br/>
          <span style={{fontSize:".65rem",opacity:.5}}>v4.0 · Web · Mobile · Alimenté par Claude IA</span>
        </div>
      </div>

      <button className="donate-fab" onClick={()=>setShowDonate(true)}>💛 Faire un don</button>
      {showDonate&&renderDonateModal()}
      {showAuthModal&&renderAuthModal()}
      {toast&&<div className="toast">{toast}</div>}
    </>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
